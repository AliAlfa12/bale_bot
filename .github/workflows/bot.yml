name: Run Bale Bot

on:
  schedule:
    # هر ۶ ساعت یک‌بار
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        echo "📦 Installing system dependencies..."
        sudo apt-get update
        sudo apt-get install -y ffmpeg rar wget curl
        echo "✅ System dependencies installed"
    
    - name: Install Python dependencies
      run: |
        echo "📦 Installing Python dependencies..."
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "✅ Python dependencies installed"
    
    - name: Debug - Check Environment
      run: |
        echo "🔍 ========== Debug Information =========="
        echo "Python version: $(python --version)"
        echo "Current directory: $(pwd)"
        echo "Directory contents: $(ls -la | head -20)"
        echo ""
        echo "Environment variables:"
        echo "  BALE_TOKEN: $([ -z '${{ secrets.BALE_TOKEN }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
        echo "  YOUTUBE_COOKIES_BASE64: $([ -z '${{ secrets.YOUTUBE_COOKIES_BASE64 }}' ] && echo '❌ NOT SET' || echo '✅ SET ('$(echo -n '${{ secrets.YOUTUBE_COOKIES_BASE64 }}' | wc -c)' chars)')"
        echo "  GEMINI_API_KEY: $([ -z '${{ secrets.GEMINI_API_KEY }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
        echo "  GH_TOKEN: $([ -z '${{ secrets.GH_TOKEN }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
        echo "  CHAT_ID_GROUP: $([ -z '${{ secrets.CHAT_ID_GROUP }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
        echo "  ARCHIVE_PASSWORD: $([ -z '${{ secrets.ARCHIVE_PASSWORD }}' ] && echo '❌ NOT SET' || echo '✅ SET')"
        echo "=========================================="
        
        # Check if ffmpeg is installed
        echo ""
        echo "ffmpeg version: $(ffmpeg -version | head -1)"
        echo "rar version: $(rar --version | head -1 || echo 'rar not found')"
    
    - name: Test YouTube Cookies Decoding
      run: |
        echo "🧪 Testing Base64 decoding..."
        python3 << 'EOF'
        import base64
        import os
        
        cookies_b64 = os.environ.get('YOUTUBE_COOKIES_BASE64', '')
        
        if not cookies_b64:
            print("❌ YOUTUBE_COOKIES_BASE64 not set")
        else:
            print(f"✅ YOUTUBE_COOKIES_BASE64 length: {len(cookies_b64)} chars")
            
            try:
                # Add padding if needed
                padding = 4 - (len(cookies_b64) % 4)
                if padding and padding != 4:
                    padded = cookies_b64 + ('=' * padding)
                else:
                    padded = cookies_b64
                
                decoded = base64.b64decode(padded)
                print(f"✅ Successfully decoded: {len(decoded)} bytes")
                
                # Check first few lines
                first_lines = decoded.decode('utf-8', errors='ignore').split('\n')[:3]
                for i, line in enumerate(first_lines, 1):
                    print(f"   Line {i}: {line[:80]}")
            except Exception as e:
                print(f"❌ Decode error: {e}")
        EOF
    
    - name: Run Bot
      env:
        BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        CHAT_ID_GROUP: ${{ secrets.CHAT_ID_GROUP }}
        ARCHIVE_PASSWORD: ${{ secrets.ARCHIVE_PASSWORD }}
        YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
      run: |
        echo "🤖 ========== Bot Starting =========="
        python main.py
        echo "🤖 ========== Bot Finished =========="
    
    - name: Save State for Next Run
      if: always()
      run: |
        echo "💾 Saving state..."
        if [ -f offset.txt ]; then
          echo "✅ offset.txt exists ($(cat offset.txt))"
        else
          echo "⚠️ offset.txt not created"
        fi
    
    - name: Upload Logs (on failure only)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-${{ github.run_number }}
        path: |
          *.log
          offset.txt
          cookies.txt
        retention-days: 7
        if-no-files-found: ignore
