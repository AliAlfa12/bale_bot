name: Run Bale Bot

on:
  schedule:
    # هر ۶ ساعت یک‌بار
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg rar wget curl
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Debug Environment
      run: |
        echo "🔍 Checking environment variables..."
        echo "BALE_TOKEN: $([ -z '${{ secrets.BALE_TOKEN }}' ] && echo 'NOT SET' || echo 'SET')"
        echo "YOUTUBE_COOKIES_BASE64: $([ -z '${{ secrets.YOUTUBE_COOKIES_BASE64 }}' ] && echo 'NOT SET' || echo 'SET ('$(echo -n '${{ secrets.YOUTUBE_COOKIES_BASE64 }}' | wc -c)' chars)')"
        echo "GEMINI_API_KEY: $([ -z '${{ secrets.GEMINI_API_KEY }}' ] && echo 'NOT SET' || echo 'SET')"
        echo "GH_TOKEN: $([ -z '${{ secrets.GH_TOKEN }}' ] && echo 'NOT SET' || echo 'SET')"
    
    - name: Run bot
      env:
        BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        CHAT_ID_GROUP: ${{ secrets.CHAT_ID_GROUP }}
        ARCHIVE_PASSWORD: ${{ secrets.ARCHIVE_PASSWORD }}
        YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
      run: |
        echo "🤖 Starting bot..."
        python main.py
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: bot-logs
        path: |
          *.log
          offset.txt
