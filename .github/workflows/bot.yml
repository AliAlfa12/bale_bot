name: Run Bale Bot

on:
  schedule:
    # هر ۶ ساعت یک‌بار
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/bot.yml'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ✅ کمتر از max 6 ساعت
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        echo "📦 Installing system dependencies..."
        sudo apt-get update -qq
        sudo apt-get install -y -qq ffmpeg rar wget curl
        echo "✅ Done"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade -q pip
        pip install -q -r requirements.txt
    
    - name: Run bot with timeout handling
      env:
        BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        CHAT_ID_GROUP: ${{ secrets.CHAT_ID_GROUP }}
        ARCHIVE_PASSWORD: ${{ secrets.ARCHIVE_PASSWORD }}
        YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}
        GOOGLE_DRIVE_DEPLOY_URL: ${{ secrets.GOOGLE_DRIVE_DEPLOY_URL }}  # ✅ اضافه شد
      run: |
        echo "🤖 Starting bot..."
        timeout 340m python main.py || EXIT_CODE=$?
        
        if [ $EXIT_CODE -eq 124 ]; then
          echo "✅ Bot reached time limit (expected)"
          exit 0
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "❌ Bot exited with code: $EXIT_CODE"
          exit $EXIT_CODE
        fi
    
    - name: Save state
      if: always()
      run: |
        echo "💾 Final state:"
        [ -f offset.txt ] && echo "  Offset: $(cat offset.txt)" || echo "  Offset: Not created"
        [ -f cookies.txt ] && echo "  Cookies: ✅" || echo "  Cookies: ❌"
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-${{ github.run_number }}
        path: |
          *.log
          offset.txt
        retention-days: 3
        if-no-files-found: ignore
