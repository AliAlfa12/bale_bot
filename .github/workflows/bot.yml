name: Bale Downloader Bot

on:
  schedule:
    - cron: '*/345 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3  # <--- این مرحله اضافه شده
        with:
          ffmpeg: true    # نصب ffmpeg برای پردازش فایل‌های صوتی و تصویری
          aria2: true     # استفاده از aria2 برای دانلود سریع‌تر
          ejs-node: true  # نصب ابزار حل چالش‌های جاوااسکریپتی یوتیوب
      
      - name: Install rar and unrar
        run: sudo apt-get install -y rar unrar
      
      - name: Cache offset
        uses: actions/cache@v3
        with:
          path: offset.txt
          key: bale-offset-cache
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run bot
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          CHAT_ID_GROUP: ${{ secrets.CHAT_ID_GROUP }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARCHIVE_PASSWORD: ${{ secrets.ARCHIVE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py
